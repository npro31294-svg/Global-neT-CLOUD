<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GBLNET-CLOUD 243</title>
<style>
body{font-family:sans-serif;background:#010a03;color:#0f0;margin:0;padding:0;}
.screen{display:none;padding:20px;}
.screen.active{display:block;}
button{padding:5px 10px;margin:3px;cursor:pointer;}
.online{color:#0f0;font-weight:700;}
.offline{color:#555;font-weight:700;}
</style>
</head>
<body>
<!-- LOGIN -->
<div id="login-screen" class="screen active">
  <h2>Connexion</h2>
  <input id="lu" placeholder="Identifiant"><br>
  <input id="lp" type="password" placeholder="Mot de passe"><br>
  <div id="lerr" style="color:red;"></div>
  <button onclick="doLogin()">Connexion</button>
</div>

<!-- PANEL -->
<div id="main-screen" class="screen">
  <h2 id="htitle">GBLNET-CLOUD 243</h2>
  <div id="dashboard">
    <h3>Clients</h3>
    <div id="clist"></div>
  </div>
</div>

<script>
// ───────── Stockage persistant ─────────
let clients=[], resellers=[], currentUser=null;

function saveData(){
  localStorage.setItem("clients",JSON.stringify(clients));
  localStorage.setItem("resellers",JSON.stringify(resellers));
}

function loadData(){
  clients=JSON.parse(localStorage.getItem("clients")||"[]");
  resellers=JSON.parse(localStorage.getItem("resellers")||"[]");
}

// ───────── Login revendeur / admin ─────────
function doLogin(){
  const u=document.getElementById("lu").value.trim();
  const p=document.getElementById("lp").value;
  const err=document.getElementById("lerr");
  loadData();
  if(u==="admin" && p==="admin"){
    currentUser={role:"admin"};
    showPanel();
  } else {
    const r=resellers.find(x=>x.username===u && x.password===p && x.status==="Active");
    if(r){
      currentUser={role:"reseller", id:r.id};
      showPanel();
    } else {
      err.textContent="Accès refusé !";
    }
  }
}

function showPanel(){
  document.getElementById("login-screen").classList.remove("active");
  document.getElementById("main-screen").classList.add("active");
  renderClients();
}

// ───────── Render clients et statut ─────────
function renderClients(){
  const clDiv=document.getElementById("clist");
  let displayClients = clients;
  if(currentUser?.role==="reseller"){
    displayClients = clients.filter(c=>c.resellerId===currentUser.id);
  }
  if(!displayClients.length){
    clDiv.innerHTML="<p>Aucun client</p>";
    return;
  }
  clDiv.innerHTML = displayClients.map(c=>{
    return <div>
      <span class="${c.online?'online':'offline'}">${c.username} (${c.online?'EN LIGNE':'OFFLINE'})</span>
      <button onclick="copyInfo(${c.id})">Copier infos</button>
    </div>;
  }).join("");
}

// ───────── Copier infos client ─────────
function copyInfo(id){
  const c=clients.find(x=>x.id===id);
  if(!c) return;
  const text=User: ${c.username}\nPass: ${c.password}\nMéthode: ${c.method}\nExpire: ${c.expires};
  try{
    const ta=document.createElement("textarea");
    ta.value=text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    alert("Infos copiées !");
  } catch(e){
    prompt("Copiez manuellement :", text);
  }
}

// ───────── Exemple initialisation données ─────────
if(!localStorage.getItem("resellers")){
  resellers=[{id:1,username:"revendeur1",password:"pass",status:"Active"}];
  clients=[{id:101,username:"client1",password:"123",method:"SSH",expires:"2026-06-01",online:true,resellerId:1}];
  saveData();
}
loadData();
</script>
</body>
</html>
